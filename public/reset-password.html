<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Express Backend Starter</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }
      h1 {
        font-size: 1.5rem;
        color: #1a1a2e;
        margin-bottom: 8px;
      }
      p.subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 28px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-bottom: 18px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #4f6ef7;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #4f6ef7;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #3b57d9;
      }
      button:disabled {
        background: #aab4e8;
        cursor: not-allowed;
      }
      .message {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }
      .message.success {
        background: #d4edda;
        color: #155724;
        display: block;
      }
      .message.error {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your new password below.</p>

      <form id="resetForm">
        <label for="password">New Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Min. 8 characters"
          required
          minlength="8"
        />

        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="Repeat password"
          required
          minlength="8"
        />

        <button type="submit" id="submitBtn">Reset Password</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <script src="/js/reset-password.js"></script>
  </body>
</html>
